name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # gocv needs OpenCV; the official image bundles OpenCV 4.11 (matching
    # gocv v0.41) and a Go toolchain.
    container: gocv/opencv:4.11.0
    steps:
      - uses: actions/checkout@v4
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...

  lint:
    runs-on: ubuntu-latest
    container: gocv/opencv:4.11.0
    steps:
      - uses: actions/checkout@v4
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
      - name: Lint
        run: "$(go env GOPATH)/bin/golangci-lint run --timeout=5m ./..."
